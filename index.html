<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#FFF5F7" />
  <title>可愛小記帳</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    /* 手機版優化樣式 */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #fbcfe8; border-radius: 4px; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
    body { font-family: sans-serif; -webkit-tap-highlight-color: transparent; background-color: #FFF5F7; }
    .animate-pop { animation: pop 0.3s ease-out; }
    @keyframes pop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // --- 圖示元件 ---
    const Icon = ({ name, size=24, className="" }) => {
      const paths = {
        Home: 'M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z',
        History: 'M12 8v4l3 3m6-3a9 9 0 1 1-18 0 9 9 0 0 1 18 0z',
        Stats: 'M21.21 15.89A10 10 0 1 1 8 2.83M22 12A10 10 0 0 0 12 2v10z',
        Settings: 'M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z',
        Trash: 'M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2',
        Edit: 'M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z',
        Transfer: 'M16 3l5 5-5 5M5 21l-5-5 5-5M21 8H7M3 16h14',
        Check: 'M22 11.08V12a10 10 0 1 1-5.93-9.14M22 4L12 14.01l-3-3',
        X: 'M18 6L6 18M6 6l12 12',
        Download: 'M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3',
        Upload: 'M16 16l-4-4-4 4M12 12v9M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3'
      };
      return (
        <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d={paths[name]} />
        </svg>
      );
    };

    const PALETTE = ['#F472B6', '#FB7185', '#FBBF24', '#34D399', '#2DD4BF', '#38BDF8', '#818CF8', '#A78BFA', '#E879F9', '#94A3B8'];

    // --- 主程式 App ---
    function App() {
      const [activeTab, setActiveTab] = useState('home');
      
      // 使用手機本地 LocalStorage 儲存資料
      const [transactions, setTransactions] = useState(JSON.parse(localStorage.getItem('cb_tx')) || []);
      const [accounts, setAccounts] = useState(JSON.parse(localStorage.getItem('cb_acc')) || [{ id: '1', name: '錢包', type: 'cash', initialBalance: 0 }]);
      const [categories, setCategories] = useState(JSON.parse(localStorage.getItem('cb_cat')) || [
        { id: 'c1', name: '飲食', emoji: '🍱', type: 'expense', color: '#FB7185' },
        { id: 'c2', name: '交通', emoji: '🚌', type: 'expense', color: '#38BDF8' },
        { id: 'c3', name: '購物', emoji: '🛍️', type: 'expense', color: '#A78BFA' },
        { id: 'c4', name: '薪水', emoji: '💰', type: 'income', color: '#34D399' }
      ]);
      const [fixedExpenses, setFixedExpenses] = useState(JSON.parse(localStorage.getItem('cb_fixed')) || []);

      // 資料變更時自動存檔到手機
      useEffect(() => {
        localStorage.setItem('cb_tx', JSON.stringify(transactions));
        localStorage.setItem('cb_acc', JSON.stringify(accounts));
        localStorage.setItem('cb_cat', JSON.stringify(categories));
        localStorage.setItem('cb_fixed', JSON.stringify(fixedExpenses));
      }, [transactions, accounts, categories, fixedExpenses]);

      // 通用的資料處理函式
      const handleDataAction = (type, action, data, id) => {
        if (type === 'transactions') {
           if (action === 'add') setTransactions([{id: Date.now().toString(), ...data}, ...transactions]);
           if (action === 'edit') setTransactions(transactions.map(t => t.id === id ? {...t, ...data} : t));
           if (action === 'delete') setTransactions(transactions.filter(t => t.id !== id));
        } else if (type === 'accounts') {
           if (action === 'add') setAccounts([...accounts, {id: Date.now().toString(), ...data}]);
           if (action === 'edit') setAccounts(accounts.map(a => a.id === id ? {...a, ...data} : a));
           if (action === 'delete') setAccounts(accounts.filter(a => a.id !== id));
        } else if (type === 'categories') {
           if (action === 'add') setCategories([...categories, {id: Date.now().toString(), ...data}]);
           if (action === 'edit') setCategories(categories.map(c => c.id === id ? {...c, ...data} : c));
           if (action === 'delete') setCategories(categories.filter(c => c.id !== id));
        } else if (type === 'fixedExpenses') {
           if (action === 'add') setFixedExpenses([...fixedExpenses, {id: Date.now().toString(), ...data}]);
           if (action === 'edit') setFixedExpenses(fixedExpenses.map(f => f.id === id ? {...f, ...data} : f));
           if (action === 'delete') setFixedExpenses(fixedExpenses.filter(f => f.id !== id));
        }
      };

      // 圓餅圖與帳戶統計計算
      const accountStats = useMemo(() => {
        let balances = {};
        accounts.forEach(a => balances[a.id] = { name: a.name, balance: parseFloat(a.initialBalance || 0) });
        transactions.forEach(t => {
          if (t.type === 'income' && balances[t.account]) balances[t.account].balance += t.amount;
          else if (t.type === 'expense' && balances[t.account]) balances[t.account].balance -= t.amount;
          else if (t.type === 'transfer') {
            if (balances[t.fromAccount]) balances[t.fromAccount].balance -= t.amount;
            if (balances[t.toAccount]) balances[t.toAccount].balance += t.amount;
          }
        });
        let totalPositive = 0; let netTotal = 0; let pieData = [];
        const colors = ['#F472B6', '#34D399', '#60A5FA', '#FBBF24', '#A78BFA', '#F87171'];
        let colorIndex = 0;
        Object.keys(balances).forEach(id => {
          const bal = balances[id].balance;
          netTotal += bal;
          if (bal > 0) {
            totalPositive += bal;
            pieData.push({ ...balances[id], color: colors[colorIndex % colors.length] });
            colorIndex++;
          }
        });
        return { balances, pieData, totalPositive, netTotal };
      }, [transactions, accounts]);

      // 自動扣款邏輯
      const runAutomations = () => {
        const today = new Date();
        const currentMonthStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2, '0')}`;
        const isLastDay = today.getDate() === new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();

        let newTx = [...transactions];
        let changed = false;

        fixedExpenses.forEach(fe => {
          if (today.getDate() >= fe.dayOfMonth) {
            const hasPaid = newTx.some(t => t.fixedId === fe.id && t.date.startsWith(currentMonthStr));
            if (!hasPaid) {
              newTx.unshift({ id: Date.now().toString() + Math.random(), amount: fe.amount, desc: fe.desc, category: fe.category, account: fe.account, type: 'expense', date: new Date().toISOString(), fixedId: fe.id });
              changed = true;
            }
          }
        });

        if (isLastDay) {
          accounts.filter(a => a.type === 'credit' && a.autoPayFrom).forEach(acc => {
            const hasPaid = newTx.some(t => t.ccPayId === acc.id && t.date.startsWith(currentMonthStr));
            if (!hasPaid) {
              const ccBal = accountStats.balances[acc.id]?.balance || 0;
              if (ccBal < 0) {
                newTx.unshift({ id: Date.now().toString() + Math.random(), type: 'transfer', amount: Math.abs(ccBal), desc: `${acc.name} 自動繳款`, fromAccount: acc.autoPayFrom, toAccount: acc.id, date: new Date().toISOString(), ccPayId: acc.id });
                changed = true;
              }
            }
          });
        }
        if (changed) setTransactions(newTx);
        alert('自動化任務檢查完成！✨');
      };

      return (
        <div className="min-h-screen pb-24">
          <header className="bg-white/90 backdrop-blur-md sticky top-0 z-10 px-6 py-4 flex justify-between items-center shadow-sm border-b border-pink-100">
            <h1 className="text-xl font-black text-pink-500 flex items-center gap-2"><span>🌸</span> 專屬小記帳</h1>
            <div className="text-[10px] bg-pink-50 text-pink-400 px-3 py-1.5 rounded-full font-bold shadow-sm">本機專用版</div>
          </header>

          <main className="p-4 max-w-lg mx-auto pb-safe">
            {activeTab === 'home' && <HomeTab accounts={accounts} categories={categories} onAction={handleDataAction} />}
            {activeTab === 'history' && <HistoryTab transactions={transactions} categories={categories} accounts={accounts} onAction={handleDataAction} />}
            {activeTab === 'stats' && <StatsTab transactions={transactions} accountStats={accountStats} categories={categories} />}
            {activeTab === 'settings' && <SettingsTab accounts={accounts} categories={categories} fixedExpenses={fixedExpenses} transactions={transactions} onAction={handleDataAction} runAutomations={runAutomations} accountStats={accountStats} setTransactions={setTransactions} setAccounts={setAccounts} setCategories={setCategories} setFixedExpenses={setFixedExpenses} />}
          </main>

          <nav className="fixed bottom-0 w-full bg-white border-t border-pink-100 pb-safe pt-2 px-6 flex justify-between shadow-[0_-10px_40px_-15px_rgba(255,192,203,0.3)] z-50">
            {[
              { id: 'home', icon: 'Home', label: '記帳' },
              { id: 'history', icon: 'History', label: '明細' },
              { id: 'stats', icon: 'Stats', label: '統計' },
              { id: 'settings', icon: 'Settings', label: '設定' }
            ].map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex flex-col items-center p-2 mb-2 transition-all duration-300 w-[60px] ${activeTab === tab.id ? 'text-pink-500 scale-110' : 'text-gray-400 hover:text-pink-300'}`}>
                <Icon name={tab.icon} size={22} className={activeTab === tab.id ? 'drop-shadow-md' : ''} />
                <span className="text-[10px] mt-1 font-bold">{tab.label}</span>
              </button>
            ))}
          </nav>
        </div>
      );
    }

    // --- 子組件：HomeTab (首頁記帳) ---
    function HomeTab({ accounts, categories, onAction }) {
      const [type, setType] = useState('expense');
      const [amount, setAmount] = useState('');
      const [desc, setDesc] = useState('');
      const [date, setDate] = useState(`${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}-${String(new Date().getDate()).padStart(2,'0')}`);

      const filteredCats = categories.filter(c => c.type === type);
      const [cat, setCat] = useState(filteredCats[0]?.id || '');
      const [acc, setAcc] = useState(accounts[0]?.id || '');
      const [fromAcc, setFromAcc] = useState(accounts[0]?.id || '');
      const [toAcc, setToAcc] = useState(accounts[1]?.id || accounts[0]?.id || '');

      useEffect(() => { setCat(categories.filter(c => c.type === type)[0]?.id || ''); }, [type, categories]);

      const handleSave = () => {
        const saveAmount = parseFloat(amount);
        if (isNaN(saveAmount) || saveAmount <= 0) return alert('請輸入金額！🐾');
        const saveDesc = desc.trim() || (type === 'transfer' ? '轉帳' : '未命名項目');

        if (type === 'transfer') {
          if (!fromAcc || !toAcc || fromAcc === toAcc) return alert('請確認轉出入帳戶是否正確設定且不同！');
          onAction('transactions', 'add', { type, amount: saveAmount, desc: saveDesc, fromAccount: fromAcc, toAccount: toAcc, date: new Date(date).toISOString() });
        } else {
          if (!cat || !acc) return alert('請先確認分類與帳戶喔！');
          onAction('transactions', 'add', { type, amount: saveAmount, desc: saveDesc, category: cat, account: acc, date: new Date(date).toISOString() });
        }
        setAmount(''); setDesc(''); alert('成功記下來囉！✨');
      };

      return (
        <div className="space-y-6 animate-pop">
          <div className="bg-white p-6 rounded-[2rem] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-pink-50">
            <div className="flex bg-pink-50 p-1 rounded-2xl mb-6">
              {['expense', 'income', 'transfer'].map(t => (
                <button key={t} onClick={() => setType(t)} className={`flex-1 py-2 rounded-xl font-bold text-sm transition-all ${type === t ? 'bg-white shadow-sm text-gray-700' : 'text-pink-300'}`}>
                  {t === 'expense' ? '支出' : t === 'income' ? '收入' : '轉帳'}
                </button>
              ))}
            </div>
            <div className="space-y-4">
              <div className="flex gap-4">
                <div className="flex-1">
                  <label className="text-xs font-bold text-pink-300 ml-2 mb-1 block">日期</label>
                  <input type="date" value={date} onChange={e=>setDate(e.target.value)} className="w-full bg-gray-50 border-none rounded-2xl p-4 font-bold text-gray-700 focus:ring-2 focus:ring-pink-200" />
                </div>
                <div className="flex-1">
                  <label className="text-xs font-bold text-pink-300 ml-2 mb-1 block">金額</label>
                  <input type="number" placeholder="0" value={amount} onChange={e=>setAmount(e.target.value)} className="w-full bg-pink-50/50 border-none rounded-2xl p-4 text-xl font-black text-gray-700 focus:ring-2 focus:ring-pink-200 text-right" />
                </div>
              </div>
              <div>
                <label className="text-xs font-bold text-pink-300 ml-2 mb-1 block">{type === 'transfer' ? '轉帳備註' : '項目說明'}</label>
                <input type="text" placeholder={type === 'transfer' ? "例如：卡費" : "買了什麼呢？"} value={desc} onChange={e=>setDesc(e.target.value)} className="w-full bg-gray-50 border-none rounded-2xl p-4 font-bold text-gray-700 focus:ring-2 focus:ring-pink-200" />
              </div>
              {type === 'transfer' ? (
                 <div className="flex gap-4 items-center bg-gray-50 p-2 rounded-2xl">
                   <div className="flex-1">
                     <label className="text-[10px] font-bold text-gray-400 ml-2 block">轉出</label>
                     <select value={fromAcc} onChange={e=>setFromAcc(e.target.value)} className="w-full bg-transparent border-none p-2 font-bold text-gray-700">{accounts.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}</select>
                   </div>
                   <div className="text-pink-300"><Icon name="Transfer" size={16}/></div>
                   <div className="flex-1">
                     <label className="text-[10px] font-bold text-gray-400 ml-2 block">轉入</label>
                     <select value={toAcc} onChange={e=>setToAcc(e.target.value)} className="w-full bg-transparent border-none p-2 font-bold text-gray-700">{accounts.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}</select>
                   </div>
                 </div>
              ) : (
                <div className="flex gap-4">
                  <div className="flex-1">
                     <label className="text-xs font-bold text-pink-300 ml-2 mb-1 block">類別</label>
                     <select value={cat} onChange={e=>setCat(e.target.value)} className="w-full bg-gray-50 border-none rounded-2xl p-4 font-bold text-gray-700">{filteredCats.map(c=><option key={c.id} value={c.id}>{c.emoji} {c.name}</option>)}</select>
                  </div>
                  <div className="flex-1">
                     <label className="text-xs font-bold text-pink-300 ml-2 mb-1 block">帳戶</label>
                     <select value={acc} onChange={e=>setAcc(e.target.value)} className="w-full bg-gray-50 border-none rounded-2xl p-4 font-bold text-gray-700">{accounts.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}</select>
                  </div>
                </div>
              )}
              <button onClick={handleSave} className={`w-full mt-2 text-white font-extrabold py-4 rounded-2xl shadow-lg hover:scale-[1.02] active:scale-95 transition-all ${type === 'income' ? 'bg-gradient-to-r from-emerald-400 to-teal-400 shadow-emerald-200' : type === 'transfer' ? 'bg-gradient-to-r from-blue-400 to-indigo-400 shadow-blue-200' : 'bg-gradient-to-r from-pink-400 to-rose-400 shadow-pink-200'}`}>{type === 'transfer' ? '執行轉帳！🔄' : '記下來！✏️'}</button>
            </div>
          </div>
        </div>
      );
    }

    // --- 子組件：HistoryTab (明細) ---
    function HistoryTab({ transactions, categories, accounts, onAction }) {
      const [dateRange, setDateRange] = useState('month'); 
      const [customStart, setCustomStart] = useState(''); const [customEnd, setCustomEnd] = useState('');
      const [selectedCat, setSelectedCat] = useState('all'); const [selectedAcc, setSelectedAcc] = useState('all');
      const [editingTx, setEditingTx] = useState(null);

      const filteredData = useMemo(() => {
        const today = new Date();
        const results = transactions.filter(t => {
          let datePass = false; const d = new Date(t.date);
          if (dateRange === 'day') datePass = d.toDateString() === today.toDateString();
          else if (dateRange === 'month') datePass = d.getMonth() === today.getMonth() && d.getFullYear() === today.getFullYear();
          else if (dateRange === 'year') datePass = d.getFullYear() === today.getFullYear();
          else if (dateRange === 'custom') {
            const start = customStart ? new Date(customStart) : new Date('1970-01-01');
            const end = customEnd ? new Date(customEnd + 'T23:59:59') : new Date('2099-12-31');
            datePass = d >= start && d <= end;
          } else datePass = true; 

          let catPass = true;
          if (selectedCat !== 'all') catPass = selectedCat === 'transfer' ? t.type === 'transfer' : t.category === selectedCat;
          
          let accPass = true;
          if (selectedAcc !== 'all') accPass = t.type === 'transfer' ? (t.fromAccount === selectedAcc || t.toAccount === selectedAcc) : t.account === selectedAcc;

          return datePass && catPass && accPass;
        });

        let income = 0, expense = 0;
        results.forEach(t => { if (t.type === 'income') income += t.amount; if (t.type === 'expense') expense += t.amount; });
        return { list: results, income, expense };
      }, [transactions, dateRange, customStart, customEnd, selectedCat, selectedAcc]);

      const handleEditClick = (t) => {
        const d = new Date(t.date);
        const localDate = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        setEditingTx({ id: t.id, type: t.type, amount: t.amount, desc: t.desc, date: localDate, category: t.category || '', account: t.account || '', fromAccount: t.fromAccount || '', toAccount: t.toAccount || '' });
      };

      const handleSaveEdit = () => {
        const saveAmount = par
